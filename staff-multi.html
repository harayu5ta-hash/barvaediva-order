<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
/*
 * ============================================================
 * staff-multi.html — マルチテナント注文管理システム（スタッフ用）
 * ============================================================
 * URL例: staff-multi.html?shop=bar-seta
 *
 * order-multi.html と同じFirestoreを使います。
 * データ構造・TTL設定・店舗追加方法は order-multi.html のコメントを参照。
 *
 * ─── Firestoreインデックス（必要に応じて作成） ───
 * orders コレクション: shopId (ASC) + createdAt (DESC)
 * → Firebaseコンソール > Firestore > インデックス > 複合インデックスを追加
 * ============================================================
 */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --main:#333333;
  --accent:#8b2020;
  --bg:#f5f0e8;
  --surface:#faf7f2;
  --border:#d4c9b0;
  --border2:#e8e0cc;
  --muted:#9a8870;
  --red:#b03030;
  --green:#3a7a4a;
  --amber:#8a6020;
  --font-h:'Playfair Display',serif;
  --font-b:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--main);font-family:var(--font-b);font-weight:300;min-height:100vh;padding-bottom:32px}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:13px;color:var(--muted);letter-spacing:.15em}
#app{display:none}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;gap:12px}
.h-logo{font-family:var(--font-h);font-size:20px;font-weight:400;color:var(--main);letter-spacing:.08em;display:flex;align-items:center;gap:8px}
#new-badge{display:none;background:var(--red);color:#fff;font-size:11px;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.h-sub{font-size:10px;color:var(--muted);text-align:right}

/* 設定パネル */
#settings-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-direction:column;gap:10px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.setting-label{font-size:12px;color:var(--main);letter-spacing:.05em}
.setting-sub{font-size:10px;color:var(--muted);margin-top:1px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:22px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.slider-row{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;accent-color:var(--accent);height:4px}
#remind-val{font-family:var(--font-h);font-size:18px;color:var(--accent);min-width:32px;text-align:right}

/* サマリーバー */
#summary-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:16px;font-size:12px;color:var(--muted);align-items:center}
#summary-bar .sum-item{display:flex;align-items:center;gap:4px}
#summary-bar .sum-val{color:var(--main);font-family:var(--font-h);font-size:16px}
#summary-bar .spacer{flex:1}
#reset-btn{padding:5px 14px;border:1px solid rgba(176,48,48,.4);background:transparent;color:var(--red);font-size:11px;letter-spacing:.08em;cursor:pointer;border-radius:2px;font-family:var(--font-b);transition:background .2s;flex-shrink:0}
#reset-btn:hover{background:rgba(176,48,48,.08)}

/* タブ */
.tab-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:11px;font-size:11px;letter-spacing:.1em;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;font-family:var(--font-b)}
.tab-btn.active{color:var(--main);border-bottom-color:var(--accent)}

/* フィルターバー */
.filter-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border2);background:var(--surface)}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:4px 14px;border-radius:2px;border:1px solid var(--border);background:var(--bg);font-size:11px;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.filter-btn.active{border-color:var(--main);color:var(--main);background:var(--border2)}

.table-filter-bar{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border2)}
.table-filter-bar::-webkit-scrollbar{display:none}
.table-filter-bar label{font-size:10px;color:var(--muted);letter-spacing:.1em;display:flex;align-items:center;flex-shrink:0;margin-right:4px}
.table-btn{flex-shrink:0;padding:4px 12px;border-radius:2px;border:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.table-btn.active{border-color:var(--main);color:var(--main);background:var(--border2)}

/* 注文カード */
#orders-list,#history-list{padding:12px 16px;max-width:600px;margin:0 auto;display:grid;gap:10px}
.order-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:opacity .3s}
.order-card.is-done{opacity:.5}
.order-card.remind{border-color:var(--amber);animation:remindblink 1s ease infinite alternate}
@keyframes remindblink{from{box-shadow:0 0 0 2px rgba(138,96,32,.2)}to{box-shadow:0 0 0 4px rgba(138,96,32,.35)}}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border2)}
.card-left{display:flex;align-items:center;gap:10px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.table-num{font-family:var(--font-h);font-size:20px;color:var(--accent)}
.time-ago{font-size:11px;color:var(--muted)}
.remind-label{font-size:10px;color:var(--amber)}
.total-price{font-family:var(--font-h);font-size:17px;color:var(--main)}
.status-badge{font-size:10px;letter-spacing:.1em;padding:2px 9px;border-radius:2px}
.status-new{background:rgba(176,48,48,.1);color:var(--red);border:1px solid rgba(176,48,48,.3)}
.status-working{background:rgba(138,96,32,.1);color:var(--amber);border:1px solid rgba(138,96,32,.3)}
.status-done{background:rgba(58,122,74,.1);color:var(--green);border:1px solid rgba(58,122,74,.25)}
.item-list{padding:10px 14px}
.item-row{display:flex;align-items:center;padding:4px 0;border-bottom:1px dashed var(--border2);font-size:13px}
.item-row:last-child{border-bottom:none}
.item-row .item-name{flex:1;color:var(--main)}
.item-row .item-qty{color:var(--muted);margin:0 12px;min-width:28px;text-align:right}
.item-row .item-sub{color:var(--muted);min-width:64px;text-align:right;font-size:12px}
.card-actions{padding:8px 14px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.act-btn{padding:7px 18px;border-radius:2px;border:1px solid;background:transparent;font-family:var(--font-b);font-size:11px;letter-spacing:.08em;cursor:pointer;transition:background .2s}
.act-working{color:var(--amber);border-color:rgba(138,96,32,.4)}
.act-working:hover{background:rgba(138,96,32,.08)}
.act-done{color:var(--green);border-color:rgba(58,122,74,.4)}
.act-done:hover{background:rgba(58,122,74,.08)}
.act-cancel{color:var(--red);border-color:rgba(176,48,48,.3);font-size:10px;padding:5px 12px;margin-left:auto}
.act-cancel:hover{background:rgba(176,48,48,.08)}
.act-reset{color:var(--muted);border-color:var(--border);font-size:10px;padding:5px 12px}
.act-reset:hover{background:var(--border2);color:var(--red)}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:2px}
.elapsed-badge{font-size:10px;padding:2px 8px;border-radius:2px;font-weight:400;letter-spacing:.05em}
.elapsed-ok{background:rgba(58,122,74,.1);color:var(--green);border:1px solid rgba(58,122,74,.25)}
.elapsed-warn{background:rgba(138,96,32,.1);color:var(--amber);border:1px solid rgba(138,96,32,.3)}
.elapsed-late{background:rgba(176,48,48,.1);color:var(--red);border:1px solid rgba(176,48,48,.3);animation:pulse 1.5s ease infinite}

/* 席管理 */
#seat-panel{padding:12px 16px;max-width:600px;margin:0 auto;display:none;gap:10px;flex-direction:column}
#seat-panel.active{display:flex}
.seat-card{background:var(--surface);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.seat-name{font-family:var(--font-h);font-size:18px;color:var(--main)}
.seat-status{font-size:10px;letter-spacing:.1em;padding:2px 10px;border-radius:2px}
.seat-active{background:rgba(58,122,74,.1);color:var(--green);border:1px solid rgba(58,122,74,.3)}
.seat-inactive{background:var(--border2);color:var(--muted);border:1px solid var(--border)}
.seat-actions{display:flex;gap:8px;align-items:center}
.seat-start{padding:6px 16px;border:1px solid rgba(58,122,74,.4);background:transparent;color:var(--green);font-size:11px;cursor:pointer;border-radius:2px;font-family:var(--font-b);transition:background .2s}
.seat-start:hover{background:rgba(58,122,74,.08)}
.seat-end{padding:6px 16px;border:1px solid rgba(176,48,48,.4);background:transparent;color:var(--red);font-size:11px;cursor:pointer;border-radius:2px;font-family:var(--font-b);transition:background .2s}
.seat-end:hover{background:rgba(176,48,48,.08)}
.seat-sid{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.05em}

/* アーカイブ */
#archive-list{padding:12px 16px;max-width:600px;margin:0 auto;display:none}

/* リセットオーバーレイ */
#reset-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:200}
.reset-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;text-align:center;max-width:300px;width:90%}
.reset-title{font-family:var(--font-h);font-size:22px;color:var(--red);margin-bottom:8px}
.reset-sub{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:22px}
.reset-btns{display:flex;gap:10px;justify-content:center}
.reset-cancel{padding:8px 22px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;border-radius:2px;font-family:var(--font-b)}
.reset-confirm{padding:8px 22px;border:1px solid rgba(176,48,48,.5);background:transparent;color:var(--red);font-size:12px;cursor:pointer;border-radius:2px;font-family:var(--font-b)}
.reset-confirm:hover{background:rgba(176,48,48,.08)}

/* トースト */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--main);color:var(--bg);padding:12px 24px;border-radius:4px;font-size:13px;transition:transform .3s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loading">読み込み中...</div>

<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="h-logo" id="shop-logo">— <span id="new-badge"></span></div>
    </div>
    <div class="h-right">
      <div class="h-sub">注文管理 / スタッフ専用</div>
    </div>
  </header>

  <div id="settings-bar">
    <div class="setting-row">
      <div><div class="setting-label">🔔 通知音</div><div class="setting-sub">新着注文が来たら音を鳴らす</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-sound" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">📳 ブラウザ通知</div><div class="setting-sub">画面上部にポップアップ通知</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-notif" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">⏰ リマインド</div><div class="setting-sub">未提供注文を一定時間でお知らせ</div></div>
      <label class="toggle"><input type="checkbox" id="toggle-remind" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row" id="remind-time-row">
      <div class="setting-label">リマインド時間</div>
      <div class="slider-row">
        <input type="range" id="remind-slider" min="3" max="30" value="10" step="1">
        <span id="remind-val">10</span><span style="font-size:11px;color:var(--muted)">分</span>
      </div>
    </div>
  </div>

  <div id="summary-bar">
    <div class="sum-item">新着<span class="sum-val" id="sum-new">0</span></div>
    <div class="sum-item">準備中<span class="sum-val" id="sum-working">0</span></div>
    <div class="sum-item">完了<span class="sum-val" id="sum-done">0</span></div>
    <div class="spacer"></div>
    <button id="reset-btn" onclick="showReset()">営業終了リセット</button>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('active')">対応中</button>
    <button class="tab-btn" onclick="switchTab('history')">本日の完了</button>
    <button class="tab-btn" onclick="switchTab('seats')">席管理</button>
    <button class="tab-btn" onclick="switchTab('archive')">過去の記録</button>
  </nav>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('new',this)">新着</button>
    <button class="filter-btn" onclick="setFilter('working',this)">準備中</button>
  </div>
  <div class="table-filter-bar" id="table-filter-bar">
    <label>席：</label>
    <button class="table-btn active" onclick="setTableFilter('all',this)">全席</button>
    <!-- 席ボタンはFirestoreの shop.tables から動的に生成 -->
  </div>

  <div id="orders-list"><div class="empty">読み込み中...</div></div>
  <div id="history-list" style="display:none"></div>
  <div id="seat-panel"></div>
  <div id="archive-list"></div>
</div>

<div id="reset-overlay" style="display:none">
  <div class="reset-box">
    <p class="reset-title">営業終了リセット</p>
    <p class="reset-sub">本日の全注文データをアーカイブして削除します。<br>この操作は元に戻せません。よろしいですか？</p>
    <div class="reset-btns">
      <button class="reset-cancel" onclick="hideReset()">キャンセル</button>
      <button class="reset-confirm" onclick="doReset()">リセットする</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// 設定UI
document.getElementById("remind-slider").addEventListener("input", function(){
  document.getElementById("remind-val").textContent = this.value;
});
document.getElementById("toggle-remind").addEventListener("change", function(){
  document.getElementById("remind-time-row").style.opacity = this.checked ? "1" : "0.4";
});

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function playSound() {
  if (!document.getElementById("toggle-sound").checked) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach((t, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = [880, 1100, 880][i];
      osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.5);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.5);
    });
  } catch(e) {}
}

function playRemindSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 440; osc.type = "triangle";
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.0);
  } catch(e) {}
}

function playCallSound() {
  if (!document.getElementById("toggle-sound").checked) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3, 0.45, 0.6].forEach((t, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = [523, 659, 784, 659, 523][i];
      osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.55);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.55);
    });
  } catch(e) {}
}
</script>

<script type="module">
const firebaseConfig = {
  apiKey:            "AIzaSyAFrmMUkpBXL-aBBxXjO8HBPOD2glM9jkk",
  authDomain:        "qrclaud.firebaseapp.com",
  projectId:         "qrclaud",
  storageBucket:     "qrclaud.firebasestorage.app",
  messagingSenderId: "1028256471338",
  appId:             "1:1028256471338:web:539d7dc0e42f988a69e653"
};

const [appMod, fsMod] = await Promise.all([
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
]);

const { initializeApp } = appMod;
const {
  getFirestore, doc, getDoc, collection, addDoc, getDocs,
  onSnapshot, query, where, serverTimestamp, Timestamp,
  updateDoc, deleteDoc, setDoc
} = fsMod;

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const shopId = new URLSearchParams(location.search).get("shop") || "";

if (!shopId) {
  document.getElementById("loading").innerHTML =
    '<div style="text-align:center;padding:60px 24px"><p style="font-size:16px;color:#666">URLに ?shop=店舗ID を指定してください</p>' +
    '<p style="font-size:12px;color:#999;margin-top:8px">例: staff-multi.html?shop=bar-seta</p></div>';
  throw new Error("shopId missing");
}

// ─── 店舗データ読み込み ───
const shopSnap = await getDoc(doc(db, "shops", shopId));
if (!shopSnap.exists()) {
  document.getElementById("loading").innerHTML =
    '<div style="text-align:center;padding:60px 24px"><p style="font-size:16px;color:#666">店舗が見つかりません: ' + shopId + '</p></div>';
  throw new Error("shop not found: " + shopId);
}
const shop = shopSnap.data();

// ─── テーマ適用 ───
const R = document.documentElement.style;
if (shop.mainColor)    R.setProperty("--main",    shop.mainColor);
if (shop.accentColor)  R.setProperty("--accent",  shop.accentColor);
if (shop.bgColor)      R.setProperty("--bg",      shop.bgColor);
if (shop.surfaceColor) R.setProperty("--surface", shop.surfaceColor);
if (shop.borderColor)  R.setProperty("--border",  shop.borderColor);

document.title = (shop.name || shopId) + " — 注文管理";
document.getElementById("shop-logo").childNodes[0].textContent = (shop.name || shopId) + " ";

document.getElementById("loading").style.display = "none";
document.getElementById("app").style.display = "block";

// ─── 席フィルターボタン生成 ───
const tables = shop.tables || [];
const tableFilterBar = document.getElementById("table-filter-bar");
tables.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "table-btn";
  btn.textContent = "Table " + t;
  btn.onclick = function() { setTableFilter(String(t), this); };
  tableFilterBar.appendChild(btn);
});

// ─── 席管理パネル生成 ───
const seatPanel = document.getElementById("seat-panel");
seatPanel.innerHTML = tables.map(t => `
  <div class="seat-card" id="seat-${t}">
    <div>
      <div class="seat-name">Table ${t}</div>
      <div class="seat-sid" id="sid-${t}">—</div>
    </div>
    <div class="seat-actions">
      <span class="seat-status seat-inactive" id="sstat-${t}">未使用 — Table ${t}</span>
      <button class="seat-start" id="sbtn-start-${t}" onclick="startSeat('${t}')">利用開始</button>
      <button class="seat-end" id="sbtn-end-${t}" onclick="endSeat('${t}')" style="display:none">利用終了</button>
    </div>
  </div>`).join("");

// ─── 状態 ───
let allOrders   = {};
let currentFilter      = "all";
let currentTableFilter = "all";
let currentTab         = "active";
let remindedKeys       = {};
let notifGranted       = false;

if ("Notification" in window) {
  Notification.requestPermission().then(p => { notifGranted = p === "granted"; });
}

// ─── ユーティリティ ───
function timeAgo(ms) {
  if (!ms) return "";
  const diff = Math.floor((Date.now() - ms) / 1000);
  if (diff < 60)   return diff + "秒前";
  if (diff < 3600) return Math.floor(diff / 60) + "分前";
  return Math.floor(diff / 3600) + "時間前";
}
function elapsedMin(ms) { return ms ? Math.floor((Date.now() - ms) / 60000) : 0; }
function tsToMs(ts) { return ts?.toMillis ? ts.toMillis() : (ts || 0); }

// ─── フィルター ───
window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
};
window.setTableFilter = function(t, btn) {
  currentTableFilter = t;
  document.querySelectorAll(".table-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
};

// ─── タブ切り替え ───
window.switchTab = function(tab) {
  currentTab = tab;
  const tabBtns = document.querySelectorAll(".tab-btn");
  tabBtns.forEach((b, i) => b.classList.toggle("active",
    (i===0&&tab==="active")||(i===1&&tab==="history")||
    (i===2&&tab==="seats")||(i===3&&tab==="archive")));
  document.getElementById("orders-list").style.display  = tab === "active"  ? "grid"  : "none";
  document.getElementById("history-list").style.display = tab === "history" ? "grid"  : "none";
  document.getElementById("archive-list").style.display = tab === "archive" ? "block" : "none";
  document.getElementById("seat-panel").classList.toggle("active", tab === "seats");
  document.getElementById("filter-bar").style.display       = tab === "active" ? "flex" : "none";
  document.getElementById("table-filter-bar").style.display = (tab === "active" || tab === "history") ? "flex" : "none";
  if (tab === "archive") loadArchive();
  else render();
};

// ─── リマインドチェック ───
function checkRemind() {
  if (!document.getElementById("toggle-remind").checked) return;
  const remindMin = parseInt(document.getElementById("remind-slider").value);
  Object.entries(allOrders).forEach(([k, o]) => {
    if (o.status === "done") return;
    const ms = tsToMs(o.createdAt);
    if (elapsedMin(ms) >= remindMin && !remindedKeys[k]) {
      remindedKeys[k] = true;
      playRemindSound();
      showToast("⚠ Table " + o.table + " — " + remindMin + "分経過しています！");
      if (notifGranted && document.getElementById("toggle-notif").checked) {
        new Notification((shop.name || shopId) + " — リマインド", {
          body: "Table " + o.table + " が" + remindMin + "分提供されていません"
        });
      }
    }
  });
}

// ─── 描画 ───
function render() {
  const remindMin = parseInt(document.getElementById("remind-slider").value);
  const slabel = { new: "新着", working: "準備中", done: "完了" };
  const scls   = { new: "status-new", working: "status-working", done: "status-done" };
  const entries = Object.entries(allOrders).sort((a, b) => tsToMs(b[1].createdAt) - tsToMs(a[1].createdAt));

  let sNew=0, sWork=0, sDone=0;
  entries.forEach(([,o]) => {
    if (o.status==="new") sNew++;
    else if (o.status==="working") sWork++;
    else if (o.status==="done") sDone++;
  });
  document.getElementById("sum-new").textContent     = sNew;
  document.getElementById("sum-working").textContent = sWork;
  document.getElementById("sum-done").textContent    = sDone;
  const badge = document.getElementById("new-badge");
  badge.textContent = sNew || ""; badge.style.display = sNew ? "inline-flex" : "none";

  if (currentTab === "active") {
    let active = entries.filter(([,o]) => o.status !== "done");
    if (currentFilter !== "all")      active = active.filter(([,o]) => o.status === currentFilter);
    if (currentTableFilter !== "all") active = active.filter(([,o]) => String(o.table) === currentTableFilter);
    const list = document.getElementById("orders-list");
    if (!active.length) { list.innerHTML = '<div class="empty">対応中の注文はありません</div>'; return; }
    list.innerHTML = active.map(([key, o]) => {
      const ms = tsToMs(o.createdAt);
      const isRemind = document.getElementById("toggle-remind").checked && elapsedMin(ms) >= remindMin && o.status !== "done";
      return `<div class="order-card${isRemind?" remind":""}" id="card-${key}">
        <div class="card-header">
          <div class="card-left">
            <span class="table-num">Table ${o.table}</span>
            <span class="status-badge ${scls[o.status]||''}">${slabel[o.status]||o.status}</span>
          </div>
          <div class="card-right">
            <span class="time-ago">${timeAgo(ms)}</span>
            <span class="elapsed-badge ${elapsedMin(ms)>=remindMin?'elapsed-late':elapsedMin(ms)>=5?'elapsed-warn':'elapsed-ok'}">⏱ ${elapsedMin(ms)}分</span>
            <span class="total-price">¥${(o.total||0).toLocaleString()}</span>
          </div>
        </div>
        <div class="item-list">${(o.items||[]).map(i =>
          `<div class="item-row"><span class="item-name">${i.name}</span><span class="item-qty">×${i.qty}</span><span class="item-sub">¥${(i.price*i.qty).toLocaleString()}</span></div>`
        ).join("")}</div>
        <div class="card-actions">
          ${o.status==="new"     ? `<button class="act-btn act-working" onclick="changeStatus('${key}','working')">準備中にする</button>` : ""}
          ${o.status==="working" ? `<button class="act-btn act-done"    onclick="changeStatus('${key}','done')">完了にする</button>` : ""}
          <button class="act-btn act-cancel" onclick="cancelOrder('${key}','${o.table}')">注文取消</button>
        </div>
      </div>`;
    }).join("");

  } else if (currentTab === "history") {
    let done = entries.filter(([,o]) => o.status === "done");
    if (currentTableFilter !== "all") done = done.filter(([,o]) => String(o.table) === currentTableFilter);
    const hlist = document.getElementById("history-list");
    if (!done.length) { hlist.innerHTML = '<div class="empty">完了した注文はまだありません</div>'; return; }

    const groups = {};
    done.forEach(entry => {
      const t = String(entry[1].table);
      (groups[t] = groups[t] || []).push(entry);
    });

    hlist.innerHTML = Object.entries(groups).map(([tname, tEntries]) => {
      const tTotal = tEntries.reduce((s,[,o]) => s + (o.total||0), 0);
      return `<div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--border2);border:1px solid var(--border);border-bottom:none">
          <span style="font-family:var(--font-h);font-size:18px;color:var(--accent)">Table ${tname}</span>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-family:var(--font-h);font-size:16px;color:var(--main)">¥${tTotal.toLocaleString()}</span>
            <button class="act-btn act-reset" onclick="resetTable('${tname}')">席リセット</button>
          </div>
        </div>
        ${tEntries.map(([key,o]) => `
          <div class="order-card is-done" style="border-top:none">
            <div class="card-header">
              <div class="card-left"><span class="status-badge status-done">完了</span></div>
              <div class="card-right"><span class="time-ago">${timeAgo(tsToMs(o.createdAt))}</span><span class="total-price">¥${(o.total||0).toLocaleString()}</span></div>
            </div>
            <div class="item-list">${(o.items||[]).map(i=>
              `<div class="item-row"><span class="item-name">${i.name}</span><span class="item-qty">×${i.qty}</span><span class="item-sub">¥${(i.price*i.qty).toLocaleString()}</span></div>`
            ).join("")}</div>
          </div>`).join("")}
      </div>`;
    }).join("") +
    `<div style="text-align:right;padding:12px 4px 4px;font-family:var(--font-h);font-size:18px;color:var(--accent);border-top:1px solid var(--border)">
      完了合計 ¥${done.reduce((s,[,o])=>s+(o.total||0),0).toLocaleString()}
    </div>`;
  }
}

// ─── Firestore リアルタイム注文監視 ───
const ordersQ = query(collection(db, "orders"), where("shopId", "==", shopId));
const prevIds = new Set();

onSnapshot(ordersQ, snap => {
  allOrders = {};
  snap.forEach(d => {
    allOrders[d.id] = d.data();
    if (!prevIds.has(d.id) && d.data().status === "new") {
      if (prevIds.size > 0) { // 初回ロード時は通知しない
        playSound();
        showToast("🍽 Table " + d.data().table + " から注文が入りました");
        if (notifGranted && document.getElementById("toggle-notif").checked) {
          new Notification((shop.name||shopId)+" — 新しい注文", {
            body: "Table " + d.data().table + " から注文が入りました"
          });
        }
      }
    }
    prevIds.add(d.id);
  });
  // 削除されたキーを prevIds から除去
  [...prevIds].forEach(id => { if (!allOrders[id]) prevIds.delete(id); });
  render();
  checkRemind();
});

// ─── スタッフ呼び出し監視 ───
const callsQ = query(collection(db, "calls"), where("shopId", "==", shopId));
const knownCalls = new Set();

onSnapshot(callsQ, snap => {
  snap.forEach(d => {
    if (!knownCalls.has(d.id)) {
      knownCalls.add(d.id);
      const c = d.data();
      const ms = tsToMs(c.createdAt);
      if (knownCalls.size > 1 || Date.now() - ms < 10000) {
        playCallSound();
        showToast("🔔 Table " + c.table + " — スタッフを呼んでいます！");
        if (notifGranted && document.getElementById("toggle-notif").checked) {
          new Notification((shop.name||shopId)+" — 呼び出し", {
            body: "Table " + c.table + " がスタッフを呼んでいます"
          });
        }
      }
    }
  });
});

// ─── 注文操作 ───
window.changeStatus = async function(id, status) {
  if (status === "done") remindedKeys[id] = true;
  try {
    await updateDoc(doc(db, "orders", id), { status });
  } catch(e) { alert("更新に失敗しました。"); }
};

window.cancelOrder = async function(id, table) {
  if (!confirm("Table " + table + " の注文を取り消しますか？")) return;
  try {
    await deleteDoc(doc(db, "orders", id));
    showToast("Table " + table + " の注文を取り消しました");
  } catch(e) { alert("取消に失敗しました。"); }
};

window.resetTable = async function(table) {
  if (!confirm("Table " + table + " の注文をリセットしますか？\n（アーカイブに保存してから削除します）")) return;
  try {
    const today = new Date();
    const dateKey = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
    const tableOrders = Object.entries(allOrders).filter(([,o]) => String(o.table) === String(table));
    for (const [id, o] of tableOrders) {
      await addDoc(collection(db, "archive"), {
        ...o, shopId, date: dateKey, archivedAt: serverTimestamp()
      });
      await deleteDoc(doc(db, "orders", id));
    }
    showToast("Table " + table + " をリセットしました");
  } catch(e) { alert("リセットに失敗しました: " + e); }
};

// ─── 営業終了リセット ───
window.showReset = () => { document.getElementById("reset-overlay").style.display = "flex"; };
window.hideReset = () => { document.getElementById("reset-overlay").style.display = "none"; };
window.doReset   = async function() {
  try {
    const today = new Date();
    const dateKey = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
    const doneOrders = Object.entries(allOrders).filter(([,o]) => o.status === "done");
    for (const [id, o] of doneOrders) {
      await addDoc(collection(db, "archive"), {
        ...o, shopId, date: dateKey, archivedAt: serverTimestamp()
      });
    }
    for (const id of Object.keys(allOrders)) {
      await deleteDoc(doc(db, "orders", id));
    }
    // calls もクリア
    const callsSnap = await getDocs(query(collection(db, "calls"), where("shopId", "==", shopId)));
    for (const d of callsSnap.docs) await deleteDoc(d.ref);

    document.getElementById("reset-overlay").style.display = "none";
    allOrders = {}; remindedKeys = {};
    render();
    showToast("営業終了リセット完了");
  } catch(e) { alert("リセットに失敗しました: " + e); }
};

// ─── 席管理（Firestoreセッション） ───
// セッション状態リアルタイム監視
tables.forEach(t => {
  const sesRef = doc(db, "sessions", `${shopId}_${t}`);
  onSnapshot(sesRef, snap => {
    const s = snap.data() || {};
    const statEl     = document.getElementById("sstat-" + t);
    const sidEl      = document.getElementById("sid-" + t);
    const startBtn   = document.getElementById("sbtn-start-" + t);
    const endBtn     = document.getElementById("sbtn-end-" + t);
    if (!statEl) return;
    if (s.active) {
      statEl.textContent = "利用中"; statEl.className = "seat-status seat-active";
      if (startBtn) startBtn.style.display = "none";
      if (endBtn)   endBtn.style.display = "inline-block";
      if (sidEl)    sidEl.textContent = "ID: " + (s.session_id || "").slice(0, 8) + "…";
    } else {
      statEl.textContent = "未使用 — Table " + t; statEl.className = "seat-status seat-inactive";
      if (startBtn) startBtn.style.display = "inline-block";
      if (endBtn)   endBtn.style.display = "none";
      if (sidEl)    sidEl.textContent = "—";
    }
  });
});

window.startSeat = async function(table) {
  const sid = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  try {
    await setDoc(doc(db, "sessions", `${shopId}_${table}`), {
      session_id: sid, active: true, started_at: serverTimestamp()
    });
    showToast("Table " + table + " 利用開始しました");
  } catch(e) { alert("エラー: " + e); }
};

window.endSeat = async function(table) {
  if (!confirm("Table " + table + " の利用を終了しますか？\n注文できなくなります。")) return;
  try {
    await updateDoc(doc(db, "sessions", `${shopId}_${table}`), {
      active: false, ended_at: serverTimestamp()
    });
    showToast("Table " + table + " 利用終了しました");
  } catch(e) { alert("エラー: " + e); }
};

// ─── アーカイブ表示 ───
async function loadArchive() {
  const el = document.getElementById("archive-list");
  el.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const snap = await getDocs(query(collection(db, "archive"), where("shopId", "==", shopId)));
    if (snap.empty) { el.innerHTML = '<div class="empty">過去の記録はありません</div>'; return; }

    const byDate = {};
    snap.forEach(d => {
      const o = d.data();
      (byDate[o.date] = byDate[o.date] || []).push(o);
    });
    const dates = Object.keys(byDate).sort().reverse();
    el.innerHTML = dates.map(date => {
      const orders = byDate[date];
      const dayTotal = orders.reduce((s, o) => s + (o.total || 0), 0);
      return `<div style="margin-bottom:20px">
        <div style="padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-bottom:none;display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--font-h);font-size:18px;color:var(--accent)">${date}</span>
          <span style="font-family:var(--font-h);font-size:16px;color:var(--main)">合計 ¥${dayTotal.toLocaleString()}</span>
        </div>
        ${orders.map(o => {
          const ms = tsToMs(o.createdAt);
          const tStr = ms ? (new Date(ms).getHours() + ":" + String(new Date(ms).getMinutes()).padStart(2,"0")) : "";
          return `<div class="order-card is-done" style="border-top:none">
            <div class="card-header">
              <div class="card-left"><span class="table-num">Table ${o.table}</span><span class="status-badge status-done">完了</span></div>
              <div class="card-right">${tStr?`<span style="font-size:13px;color:var(--muted)">${tStr}</span>`:""}<span class="total-price">¥${(o.total||0).toLocaleString()}</span></div>
            </div>
            <div class="item-list">${(o.items||[]).map(i=>
              `<div class="item-row"><span class="item-name">${i.name}</span><span class="item-qty">×${i.qty}</span><span class="item-sub">¥${(i.price*i.qty).toLocaleString()}</span></div>`
            ).join("")}</div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("");
  } catch(e) { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; }
}

setInterval(() => { render(); checkRemind(); }, 60000);
</script>
</body>
</html>
