<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --main:#3d2000;--accent:#c47a2e;--bg:#fdf6ec;
  --surface:#fffbf4;--border:#e8d5b0;--muted:#9a6a40;
  --new-bg:#fff8ec;--new-border:#f0c060;
  --work-bg:#fff3ea;--work-border:#e07030;
  --done-bg:#f0f7f0;--done-border:#7ab07a;
  --red:#c03030;--amber:#c47a2e;--green:#3a8a3a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--main);font-family:'Noto Serif JP',serif;min-height:100vh;padding-bottom:80px}

/* ── TOP BAR ── */
#topbar{
  background:var(--main);color:#fdf6ec;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--accent);
  position:sticky;top:0;z-index:100;
}
#topbar-title{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.06em}
#topbar-right{display:flex;align-items:center;gap:12px}
#sales-total{
  font-family:'Playfair Display',serif;font-size:16px;
  border:1px solid rgba(255,255,255,.3);padding:4px 12px;border-radius:3px;
}
#topbar-shop{font-size:12px;opacity:.7;letter-spacing:.04em}

/* ── FILTER BAR ── */
#filter-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  overflow-x:auto;scrollbar-width:none;
  position:sticky;top:67px;z-index:90;flex-wrap:wrap;
}
.chip{
  flex:none;padding:5px 14px;font-size:12px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;
}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#sort-btn{
  margin-left:auto;flex:none;
  padding:5px 14px;font-size:12px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;font-family:inherit;
}
#sort-btn.asc{background:var(--main);color:#fdf6ec;border-color:var(--main)}

/* ── ORDER GRID ── */
#orders-wrap{padding:14px 12px;display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
#no-orders{display:none;text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}

/* ── ORDER CARD ── */
.order-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:6px;overflow:hidden;
  box-shadow:0 2px 8px rgba(61,32,0,.06);
  display:flex;
}
.urgency-bar{width:5px;flex:none}
.card-body{flex:1;padding:14px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-table{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--main)}
.card-meta{text-align:right}
.card-time{font-size:12px;color:var(--muted)}
.elapsed-badge{
  font-size:11px;padding:2px 8px;border-radius:10px;margin-top:3px;
  display:inline-block;
}
.elapsed-green{background:#e6f4ec;color:#2a7a2a}
.elapsed-amber{background:#fdf0d0;color:#7a5000}
.elapsed-red{background:#fde8e8;color:#a02020;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.card-status{
  margin-bottom:10px;
}
.status-badge{
  font-size:12px;padding:3px 12px;border-radius:3px;
  letter-spacing:.04em;display:inline-block;
}
.s-new   {background:var(--new-bg);border:1px solid var(--new-border);color:#7a5000}
.s-working{background:var(--work-bg);border:1px solid var(--work-border);color:#7a2000}
.s-done  {background:var(--done-bg);border:1px solid var(--done-border);color:#2a5a2a}

.serving-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.serving-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;background:var(--bg);
  border:1px solid var(--border);border-radius:4px;
}
.serving-row.completed{opacity:.45;text-decoration:line-through}
.serving-check{
  width:18px;height:18px;border-radius:3px;
  border:1.5px solid var(--border);background:#fff;
  flex:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;transition:all .15s;
}
.serving-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.serving-name{flex:1;font-size:14px}
.serving-price{font-size:13px;color:var(--muted)}

.card-progress{margin-bottom:10px}
.progress-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.progress-bar{background:var(--border);height:4px;border-radius:2px}
.progress-fill{background:var(--accent);height:4px;border-radius:2px;transition:width .3s}
.progress-fill.full{background:var(--green)}

.card-total{
  text-align:right;font-family:'Playfair Display',serif;
  font-size:15px;color:var(--accent);margin-bottom:10px;
}

/* ── TABLE MANAGEMENT ── */
#tables-tab-content{padding:16px}
#tables-tab-content h2{
  font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);
  margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:10px;
}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.table-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:6px;
  padding:14px;text-align:center;
}
.table-card.active{border-color:var(--green);background:#f0f9f0}
.table-card.inactive{opacity:.6}
.table-label{font-size:14px;font-weight:700;color:var(--main);margin-bottom:8px}
.table-status{font-size:11px;color:var(--muted);margin-bottom:10px}
.table-status.on{color:var(--green)}
.toggle-btn{
  width:100%;padding:7px;font-size:12px;
  border:1.5px solid var(--border);background:var(--bg);
  border-radius:3px;cursor:pointer;font-family:inherit;
  color:var(--main);transition:all .15s;
}
.toggle-btn:hover{background:var(--border)}
.toggle-btn.on{background:var(--green);color:#fff;border-color:var(--green)}

/* ── HISTORY TAB ── */
#history-tab-content{padding:16px}
#history-tab-content h2{
  font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);
  margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:10px;
}
.hist-group{margin-bottom:20px}
.hist-group-title{
  font-size:13px;font-weight:700;color:var(--muted);
  margin-bottom:8px;letter-spacing:.05em;
  padding-bottom:6px;border-bottom:1px dotted var(--border);
}
.hist-row{
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:12px;margin-bottom:8px;
}
.hist-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hist-time{font-size:12px;color:var(--muted)}
.hist-total{font-family:'Playfair Display',serif;font-size:14px;color:var(--accent)}
.hist-items{font-size:13px;line-height:1.8;color:var(--main);margin-bottom:8px}
.hist-actions{display:flex;gap:8px}
.hist-btn{
  flex:1;padding:7px;font-size:12px;
  border:1.5px solid var(--border);background:var(--bg);
  border-radius:3px;cursor:pointer;font-family:inherit;
  color:var(--main);transition:all .15s;
}
.hist-btn:hover{background:var(--border)}
.hist-btn.danger{color:var(--red);border-color:#e0a0a0}
.hist-btn.danger:hover{background:#fde8e8}

/* ── TAB BAR ── */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  display:flex;background:var(--surface);border-top:1px solid var(--border);
}
#nav-bar button{
  flex:1;padding:12px 0;background:none;border:none;
  font-size:12px;font-family:inherit;color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
#nav-bar button span.icon{font-size:18px}
#nav-bar button.active{color:var(--accent);font-weight:700}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(61,32,0,.9);color:#fdf6ec;
  padding:10px 24px;border-radius:20px;font-size:14px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;
}
#toast.show{opacity:1}

/* ── CALL NOTICE ── */
#call-notice{
  display:none;position:fixed;top:80px;left:0;right:0;z-index:200;
  background:#fff8ec;border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);
  padding:12px 20px;text-align:center;font-size:14px;color:#7a4000;
  font-weight:600;letter-spacing:.03em;
}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div id="topbar-title">Café Staff</div>
    <div id="topbar-shop"></div>
  </div>
  <div id="topbar-right">
    <div id="sales-total">¥0</div>
  </div>
</div>

<div id="call-notice">🔔 <span id="call-text"></span></div>

<!-- ORDERS TAB -->
<div id="orders-tab-content">
  <div id="filter-bar">
    <button class="chip active" data-table="all" onclick="setTableFilter('all',this)">すべて</button>
    <span style="width:1px;background:var(--border);height:20px;flex:none"></span>
    <button class="chip active" data-status="new"     onclick="toggleStatusFilter('new',this)">受付</button>
    <button class="chip active" data-status="working" onclick="toggleStatusFilter('working',this)">対応中</button>
    <button class="chip"        data-status="done"    onclick="toggleStatusFilter('done',this)">提供済</button>
    <button id="sort-btn" onclick="toggleSort()">↓ 新しい順</button>
  </div>
  <div id="orders-wrap"></div>
  <div id="no-orders">注文はありません</div>
</div>

<!-- TABLES TAB -->
<div id="tables-tab-content" style="display:none">
  <h2>テーブル管理</h2>
  <div id="tables-grid"></div>
</div>

<!-- HISTORY TAB -->
<div id="history-tab-content" style="display:none">
  <h2>本日の完了</h2>
  <div id="history-list"></div>
</div>

<div id="nav-bar">
  <button class="active" id="nav-orders" onclick="switchNav('orders')">
    <span class="icon">☕</span><span>注文</span>
  </button>
  <button id="nav-tables" onclick="switchNav('tables')">
    <span class="icon">🗂</span><span>テーブル</span>
  </button>
  <button id="nav-history" onclick="switchNav('history')">
    <span class="icon">🧾</span><span>完了履歴</span>
  </button>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, onSnapshot, updateDoc, deleteDoc,
  query, where, orderBy, getDoc, setDoc, getDocs, serverTimestamp, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAFrmMUkpBXL-aBBxXjO8HBPOD2glM9jkk",
  authDomain:        "qrclaud.firebaseapp.com",
  projectId:         "qrclaud",
  storageBucket:     "qrclaud.firebasestorage.app",
  messagingSenderId: "1028256471338",
  appId:             "1:1028256471338:web:539d7dc0e42f988a69e653"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params = new URLSearchParams(location.search);
const shopId = params.get("shop") || "cafe-demo";

let shopData = null;
let allOrders = {};
let tableFilter  = "all";
let statusFilter = new Set(["new","working"]);
let sortAsc = false;
let tablesList = [];
let tableStates = {};

const ALCOHOL_KW = ["ビール","日本酒","焼酎","ハイボール","チューハイ","ワイン","カクテル","ウィスキー","ウイスキー","リモンチェッロ","グラッパ"];

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

function tableName(t){
  return t.startsWith("counter") ? "カウンター "+t.replace("counter","") : "テーブル "+t;
}

function elapsedLabel(createdAt){
  if(!createdAt) return {label:"—",cls:"elapsed-green"};
  const ms = Date.now() - createdAt.toMillis();
  const m  = Math.floor(ms/60000);
  if(m<5)  return {label:m+"分",cls:"elapsed-green"};
  if(m<10) return {label:m+"分",cls:"elapsed-amber"};
  return {label:m+"分 ⚠",cls:"elapsed-red"};
}

function urgencyColor(createdAt){
  if(!createdAt) return "#7ab07a";
  const m = Math.floor((Date.now()-createdAt.toMillis())/60000);
  if(m<5)  return "#7ab07a";
  if(m<10) return "#e0a030";
  return "#c03030";
}

// Render orders
function renderOrders(){
  const wrap = document.getElementById("orders-wrap");
  const noOrd= document.getElementById("no-orders");
  wrap.innerHTML = "";

  let filtered = Object.entries(allOrders)
    .filter(([,o])=> tableFilter==="all" || o.table===tableFilter)
    .filter(([,o])=> statusFilter.has(o.status||"new"));

  filtered.sort((a,b)=>{
    const ta = a[1].createdAt?.toMillis()||0;
    const tb = b[1].createdAt?.toMillis()||0;
    return sortAsc ? ta-tb : tb-ta;
  });

  if(!filtered.length){ noOrd.style.display="block"; return; }
  noOrd.style.display="none";

  // Daily sales
  const totalSales = Object.values(allOrders)
    .filter(o=>o.status==="done")
    .reduce((s,o)=>s+(o.total||0),0);
  document.getElementById("sales-total").textContent = "¥"+totalSales.toLocaleString();

  filtered.forEach(([id,o])=>{
    const el = elapsedLabel(o.createdAt);
    const uc = urgencyColor(o.createdAt);
    const items = o.items||[];
    const completed = o.completedItems||[];
    const totalServings = items.reduce((s,i)=>s+i.qty,0);
    const doneCount = completed.length;
    const pct = totalServings>0 ? Math.round(doneCount/totalServings*100) : 0;

    const statusMap = {new:"受付済",working:"対応中",done:"提供済"};
    const statusCls = {new:"s-new",working:"s-working",done:"s-done"};

    let servingHtml = "";
    let globalIdx = 0;
    items.forEach((item,ii)=>{
      for(let si=0;si<item.qty;si++){
        const key = `${ii}-${si}`;
        const isDone = completed.includes(key);
        servingHtml += `
          <div class="serving-row ${isDone?"completed":""}" id="sr-${id}-${globalIdx}">
            <div class="serving-check ${isDone?"checked":""}" onclick="window.toggleServing('${id}',${ii},${si})">
              ${isDone?"✓":""}
            </div>
            <div class="serving-name">${item.name}${item.qty>1?" ("+(si+1)+"/"+item.qty+")":""}</div>
            <div class="serving-price">¥${item.price.toLocaleString()}</div>
          </div>`;
        globalIdx++;
      }
    });

    const card = document.createElement("div");
    card.className = "order-card";
    card.id = "card-"+id;
    card.innerHTML = `
      <div class="urgency-bar" style="background:${uc}"></div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-table">${tableName(o.table)}</div>
          <div class="card-meta">
            <div class="card-time">${o.createdAt?new Date(o.createdAt.toMillis()).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):""}</div>
            <div class="elapsed-badge ${el.cls}">${el.label}</div>
          </div>
        </div>
        <div class="card-status"><span class="status-badge ${statusCls[o.status||"new"]}">${statusMap[o.status||"new"]}</span></div>
        <div class="serving-list">${servingHtml}</div>
        <div class="card-progress">
          <div class="progress-label">${doneCount}/${totalServings} 品提供</div>
          <div class="progress-bar">
            <div class="progress-fill ${pct===100?"full":""}" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="card-total">合計 ¥${(o.total||0).toLocaleString()}</div>
      </div>
    `;
    wrap.appendChild(card);
  });
}

// Toggle serving
window.toggleServing = async function(orderId, itemIdx, serveIdx){
  const o = allOrders[orderId];
  if(!o) return;
  const key = `${itemIdx}-${serveIdx}`;
  const completed = [...(o.completedItems||[])];
  const pos = completed.indexOf(key);
  if(pos===-1) completed.push(key); else completed.splice(pos,1);
  const totalServings = (o.items||[]).reduce((s,i)=>s+i.qty,0);
  const upd = { completedItems:completed };
  if(completed.length===totalServings) upd.status="done";
  else if(completed.length>0)          upd.status="working";
  else                                 upd.status="new";
  await updateDoc(doc(db,"orders",orderId), upd);
};

// History tab
function renderHistory(){
  const done = Object.entries(allOrders)
    .filter(([,o])=>o.status==="done")
    .sort((a,b)=>(a[1].createdAt?.toMillis()||0)-(b[1].createdAt?.toMillis()||0));

  const groups = {};
  done.forEach(([id,o])=>{
    const t = o.table||"?";
    if(!groups[t]) groups[t]=[];
    groups[t].push([id,o]);
  });

  const list = document.getElementById("history-list");
  list.innerHTML = "";
  if(!done.length){
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px 0;font-size:14px">まだ完了した注文はありません</p>';
    return;
  }
  Object.entries(groups).forEach(([table,orders])=>{
    const grp = document.createElement("div");
    grp.className = "hist-group";
    grp.innerHTML = `<div class="hist-group-title">${tableName(table)}</div>`;
    orders.forEach(([id,o])=>{
      const time = o.createdAt ? new Date(o.createdAt.toMillis()).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}) : "";
      const itemStr = (o.items||[]).map(i=>i.name+"×"+i.qty).join("　");
      const row = document.createElement("div");
      row.className = "hist-row";
      row.innerHTML = `
        <div class="hist-row-header">
          <span class="hist-time">${time}</span>
          <span class="hist-total">¥${(o.total||0).toLocaleString()}</span>
        </div>
        <div class="hist-items">${itemStr}</div>
        <div class="hist-actions">
          <button class="hist-btn" onclick="window.undoOrder('${id}')">対応中に戻す</button>
          <button class="hist-btn danger" onclick="window.deleteOrder('${id}','${o.table}')">削除</button>
        </div>
      `;
      grp.appendChild(row);
    });
    list.appendChild(grp);
  });
}

window.undoOrder = async function(id){
  await updateDoc(doc(db,"orders",id),{status:"working",completedItems:[]});
  showToast("対応中に戻しました");
};
window.deleteOrder = async function(id,table){
  if(!confirm(tableName(table)+" のこの注文を削除しますか？")) return;
  await deleteDoc(doc(db,"orders",id));
  showToast("削除しました");
};

// Table management
async function renderTables(){
  const grid = document.getElementById("tables-grid");
  grid.innerHTML = "";
  if(!tablesList.length){ grid.innerHTML="<p style='color:var(--muted)'>テーブル情報がありません</p>"; return; }

  // Group: テーブル / カウンター
  const regular = tablesList.filter(t=>!t.startsWith("counter"));
  const counter  = tablesList.filter(t=>t.startsWith("counter"));

  function makeSection(label,tables){
    if(!tables.length) return;
    const h = document.createElement("h3");
    h.style.cssText="font-size:14px;color:var(--muted);margin-bottom:10px;letter-spacing:.05em;font-weight:600";
    h.textContent = label;
    grid.appendChild(h);
    const g = document.createElement("div");
    g.className="table-grid";
    tables.forEach(t=>{
      const st = tableStates[t];
      const isActive = st?.active===true;
      const c = document.createElement("div");
      c.className="table-card "+(isActive?"active":"inactive");
      c.id="tc-"+t;
      c.innerHTML=`
        <div class="table-label">${tableName(t)}</div>
        <div class="table-status ${isActive?"on":""}">${isActive?"利用中":"準備中"}</div>
        <button class="toggle-btn ${isActive?"on":""}"
          onclick="window.toggleTable('${t}',${isActive})">
          ${isActive?"席を終了する":"席を利用開始"}
        </button>
      `;
      g.appendChild(c);
    });
    grid.appendChild(g);
  }
  makeSection("テーブル",regular);
  makeSection("カウンター",counter);
}

window.toggleTable = async function(tableId,isActive){
  const ref = doc(db,"sessions",shopId+"_"+tableId);
  if(isActive){
    if(!confirm(tableName(tableId)+"を終了しますか？")) return;
    await updateDoc(ref,{active:false,ended_at:serverTimestamp()});
    showToast(tableName(tableId)+" を終了しました");
  } else {
    const sid = "sess_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    await setDoc(ref,{active:true,session_id:sid,started_at:serverTimestamp(),ended_at:null});
    showToast(tableName(tableId)+" を利用開始しました");
  }
};

// Filters
window.setTableFilter = function(val,btn){
  tableFilter = val;
  document.querySelectorAll("[data-table]").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderOrders();
};
window.toggleStatusFilter = function(val,btn){
  if(statusFilter.has(val)) statusFilter.delete(val);
  else statusFilter.add(val);
  btn.classList.toggle("active",statusFilter.has(val));
  renderOrders();
};
window.toggleSort = function(){
  sortAsc = !sortAsc;
  const btn = document.getElementById("sort-btn");
  btn.textContent = sortAsc ? "↑ 古い順" : "↓ 新しい順";
  btn.classList.toggle("asc",sortAsc);
  renderOrders();
};

// Nav
window.switchNav = function(tab){
  ["orders","tables","history"].forEach(t=>{
    document.getElementById(t+"-tab-content").style.display = t===tab?"block":"none";
    document.getElementById("nav-"+t).classList.toggle("active",t===tab);
  });
  if(tab==="history") renderHistory();
  if(tab==="tables")  renderTables();
};

// Init
async function init(){
  // Load shop config
  try{
    const snap = await getDoc(doc(db,"shops",shopId));
    if(snap.exists()){
      shopData = snap.data();
      document.getElementById("topbar-shop").textContent = shopData.name||"";
      tablesList = shopData.tables||[];
    }
  }catch(e){ console.warn(e); }

  // Build table filter chips
  const fb = document.getElementById("filter-bar");
  tablesList.forEach(t=>{
    const btn = document.createElement("button");
    btn.className="chip";
    btn.dataset.table=t;
    btn.textContent=tableName(t);
    btn.onclick=()=>setTableFilter(t,btn);
    fb.insertBefore(btn, document.getElementById("sort-btn"));
  });

  // Listen to orders (shopIdだけでフィルター→複合インデックス不要)
  const q = query(
    collection(db,"orders"),
    where("shopId","==",shopId)
  );
  let firstLoad = true;
  onSnapshot(q, snap=>{
    snap.docChanges().forEach(change=>{
      if(change.type==="removed"){
        delete allOrders[change.doc.id];
      } else {
        allOrders[change.doc.id] = change.doc.data();
        // 新規注文トースト（初回ロード除く）
        if(!firstLoad && change.type==="added"){
          const d = change.doc.data();
          const hasAlcohol = (d.items||[]).some(i=>ALCOHOL_KW.some(k=>i.name.includes(k)));
          const msg = "☕ "+tableName(d.table)+" から注文が入りました"+(hasAlcohol?" 🍺お酒はストローいらんぞ":"");
          showToast(msg);
        }
      }
    });
    firstLoad = false;
    renderOrders();
    const total = Object.values(allOrders).filter(o=>o.status==="done").reduce((s,o)=>s+(o.total||0),0);
    document.getElementById("sales-total").textContent = "¥"+total.toLocaleString();
  });

  // Listen to sessions
  tablesList.forEach(t=>{
    onSnapshot(doc(db,"sessions",shopId+"_"+t), snap=>{
      tableStates[t] = snap.exists() ? snap.data() : null;
      if(document.getElementById("tables-tab-content").style.display!=="none") renderTables();
    });
  });

  // Listen to calls
  onSnapshot(
    query(collection(db,"calls"),where("shopId","==",shopId)),
    snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type==="added"){
          const d = change.doc.data();
          const notice = document.getElementById("call-notice");
          const txt    = document.getElementById("call-text");
          txt.textContent = tableName(d.table)+" からお呼びです";
          notice.style.display="block";
          setTimeout(()=>{ notice.style.display="none"; },8000);
        }
      });
    }
  );

  // Tick elapsed times
  setInterval(renderOrders, 60000);
}

init();
</script>
</body>
</html>
