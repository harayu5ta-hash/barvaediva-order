<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>barvaediva — 注文管理</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0b09;--surface:#181410;--border:#2e2820;
  --gold:#c9a96e;--gold-dim:#8a6e45;--text:#f0ead8;--muted:#7a6f5e;
  --red:#e05c5c;--green:#6dbf8a;--amber:#d4a24c;
  --font-d:'Cormorant Garamond',serif;--font-b:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:300;min-height:100vh;padding-bottom:32px}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.h-logo{font-family:var(--font-d);font-size:20px;font-weight:300;color:var(--gold);letter-spacing:.1em;display:flex;align-items:center;gap:10px}
#new-badge{display:none;background:var(--red);color:#fff;font-size:11px;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.h-sub{font-size:11px;color:var(--muted);text-align:right;line-height:1.6}

.tab-nav{display:flex;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:12px;font-size:11px;letter-spacing:.12em;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;font-family:var(--font-b)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.filter-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 14px;border-radius:2px;border:1px solid var(--border);background:transparent;font-size:11px;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.filter-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,169,110,.07)}

/* テーブルフィルター */
.table-filter-bar{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.table-filter-bar::-webkit-scrollbar{display:none}
.table-filter-bar label{font-size:10px;color:var(--muted);letter-spacing:.1em;display:flex;align-items:center;flex-shrink:0;margin-right:4px}
.table-btn{flex-shrink:0;padding:4px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.table-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,169,110,.07)}

#orders-list{padding:12px 16px;max-width:600px;margin:0 auto;display:grid;gap:10px}
#history-list{padding:12px 16px;max-width:600px;margin:0 auto;display:grid;gap:10px}

.order-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;transition:opacity .3s}
.order-card.is-done{opacity:.4}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.card-left{display:flex;align-items:center;gap:10px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.table-num{font-family:var(--font-d);font-size:20px;font-weight:400;color:var(--gold)}
.time-ago{font-size:11px;color:var(--muted)}
.total-price{font-family:var(--font-d);font-size:17px;color:var(--text)}
.status-badge{font-size:10px;letter-spacing:.1em;padding:2px 9px;border-radius:2px}
.status-new{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.3)}
.status-working{background:rgba(212,162,76,.12);color:var(--amber);border:1px solid rgba(212,162,76,.3)}
.status-done{background:rgba(109,191,138,.1);color:var(--green);border:1px solid rgba(109,191,138,.25)}
.item-list{padding:10px 14px}
.item-row{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(46,40,32,.4);font-size:13px}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;color:var(--text)}
.item-qty{color:var(--muted);margin:0 12px;min-width:28px;text-align:right}
.item-subtotal{color:var(--gold-dim);min-width:64px;text-align:right;font-size:12px}
.card-actions{padding:8px 14px 12px;display:flex;gap:8px;align-items:center}
.act-btn{padding:7px 18px;border-radius:2px;border:1px solid;background:transparent;font-family:var(--font-b);font-size:11px;letter-spacing:.08em;cursor:pointer;transition:background .2s}
.act-working{color:var(--amber);border-color:rgba(212,162,76,.4)}
.act-working:hover{background:rgba(212,162,76,.1)}
.act-done{color:var(--green);border-color:rgba(109,191,138,.4)}
.act-done:hover{background:rgba(109,191,138,.08)}
.done-label{font-size:11px;color:var(--green);letter-spacing:.08em}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:3px}

/* 集計バー */
#summary-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:16px;font-size:12px;color:var(--muted);align-items:center}
#summary-bar .sum-item{display:flex;align-items:center;gap:4px}
#summary-bar span{color:var(--text);font-family:var(--font-d);font-size:16px}
#summary-bar .spacer{flex:1}

/* リセットボタン */
#reset-btn{
  padding:5px 14px;
  border:1px solid rgba(224,92,92,.4);
  background:transparent;
  color:var(--red);
  font-size:11px;
  letter-spacing:.08em;
  cursor:pointer;
  border-radius:2px;
  font-family:var(--font-b);
  transition:background .2s;
  flex-shrink:0;
}
#reset-btn:hover{background:rgba(224,92,92,.1)}

/* リセット確認モーダル */
#reset-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(14,11,9,.88);
  align-items:center;justify-content:center;
  z-index:200;
}
.reset-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:32px 28px;
  text-align:center;
  max-width:300px;width:90%;
}
.reset-title{font-family:var(--font-d);font-size:22px;color:var(--red);margin-bottom:8px;font-weight:300}
.reset-sub{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:22px}
.reset-btns{display:flex;gap:10px;justify-content:center}
.reset-cancel{padding:8px 22px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;border-radius:2px;font-family:var(--font-b);transition:border-color .2s}
.reset-cancel:hover{border-color:var(--gold-dim)}
.reset-confirm{padding:8px 22px;border:1px solid rgba(224,92,92,.5);background:transparent;color:var(--red);font-size:12px;cursor:pointer;border-radius:2px;font-family:var(--font-b);transition:background .2s}
.reset-confirm:hover{background:rgba(224,92,92,.1)}
</style>
</head>
<body>

<header>
  <div class="h-logo">barvaediva <span id="new-badge"></span></div>
  <div class="h-sub">注文管理<br>スタッフ専用</div>
</header>

<div id="summary-bar">
  <div class="sum-item">新着<span id="sum-new">0</span></div>
  <div class="sum-item">準備中<span id="sum-working">0</span></div>
  <div class="sum-item">完了<span id="sum-done">0</span></div>
  <div class="spacer"></div>
  <button id="reset-btn" onclick="showReset()">営業終了リセット</button>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('active')">対応中</button>
  <button class="tab-btn" onclick="switchTab('history')">完了履歴</button>
</nav>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('new',this)">新着</button>
  <button class="filter-btn" onclick="setFilter('working',this)">準備中</button>
</div>
<div class="table-filter-bar" id="table-filter-bar">
  <label>席：</label>
  <button class="table-btn active" onclick="setTableFilter('all',this)">全席</button>
  <button class="table-btn" onclick="setTableFilter('1',this)">Table 1</button>
  <button class="table-btn" onclick="setTableFilter('2',this)">Table 2</button>
  <button class="table-btn" onclick="setTableFilter('3',this)">Table 3</button>
  <button class="table-btn" onclick="setTableFilter('counter1',this)">Counter 1</button>
  <button class="table-btn" onclick="setTableFilter('counter2',this)">Counter 2</button>
  <button class="table-btn" onclick="setTableFilter('counter3',this)">Counter 3</button>
</div>

<div id="orders-list"><div class="empty">読み込み中...</div></div>
<div id="history-list" style="display:none"><div class="empty">完了した注文がここに表示されます</div></div>

<!-- リセット確認モーダル -->
<div id="reset-overlay" style="display:none">
  <div class="reset-box">
    <p class="reset-title">営業終了リセット</p>
    <p class="reset-sub">本日の全注文データを削除します。<br>この操作は元に戻せません。<br>よろしいですか？</p>
    <div class="reset-btns">
      <button class="reset-cancel" onclick="hideReset()">キャンセル</button>
      <button class="reset-confirm" onclick="doReset()">リセットする</button>
    </div>
  </div>
</div>

<!-- ★★★ ここにFirebaseの設定を貼り付け ★★★
  order.html と同じ値を下に貼り付けてください -->
<script type="module">
var firebaseConfig = {
apiKey:            "AIzaSyAFrmMUkpBXL-aBBxXjO8HBPOD2glM9jkk",
authDomain:        "qrclaud.firebaseapp.com",
databaseURL:       "https://qrclaud-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:         "qrclaud",
storageBucket:     "qrclaud.firebasestorage.app",
messagingSenderId: "1028256471338",
appId:             "1:1028256471338:web:539d7dc0e42f988a69e653"
};

if (firebaseConfig.apiKey.includes("ここに")) {
  document.getElementById("orders-list").innerHTML='<div class="empty">Firebase未設定です。staff.htmlをメモ帳で開いてAPIキーを設定してください。</div>';
} else {
  Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js")
  ]).then(function(modules) {
    var initializeApp = modules[0].initializeApp;
    var m = modules[1];
    var app = initializeApp(firebaseConfig);
    var db = m.getDatabase(app);

    var allOrders = {};
    var notifGranted = false;
    var currentFilter = "all";
    var currentTableFilter = "all";
    var currentTab = "active";

    if("Notification" in window){
      Notification.requestPermission().then(function(p){ notifGranted=p==="granted"; });
    }

    function timeAgo(ts) {
      if(!ts) return "";
      var diff = Math.floor((Date.now()-ts)/1000);
      if(diff<60) return diff+"秒前";
      if(diff<3600) return Math.floor(diff/60)+"分前";
      return Math.floor(diff/3600)+"時間前";
    }

    window.setFilter = function(f, btn) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      render();
    };

    window.setTableFilter = function(t, btn) {
      currentTableFilter = t;
      document.querySelectorAll(".table-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      render();
    };

    window.switchTab = function(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(function(b,i){
        b.classList.toggle("active",(i===0&&tab==="active")||(i===1&&tab==="history"));
      });
      document.getElementById("orders-list").style.display = tab==="active"?"grid":"none";
      document.getElementById("history-list").style.display = tab==="history"?"grid":"none";
      document.getElementById("filter-bar").style.display = tab==="active"?"flex":"none";
      document.getElementById("table-filter-bar").style.display = "flex";
      render();
    };

    window.changeStatus = function(key, status) {
      m.update(m.ref(db,"orders/"+key),{status:status});
    };

    // リセット処理
    window.showReset = function() {
      document.getElementById("reset-overlay").style.display="flex";
    };
    window.hideReset = function() {
      document.getElementById("reset-overlay").style.display="none";
    };
    window.doReset = async function() {
      try {
        await m.remove(m.ref(db,"orders"));
        document.getElementById("reset-overlay").style.display="none";
        allOrders = {};
        render();
      } catch(err) {
        alert("リセットに失敗しました。");
        console.error(err);
      }
    };

    function render() {
      var slabel={new:"新着",working:"準備中",done:"完了"};
      var scls={new:"status-new",working:"status-working",done:"status-done"};
      var entries = Object.entries(allOrders).sort(function(a,b){ return (b[1].createdAt||0)-(a[1].createdAt||0); });

      var sNew=0,sWork=0,sDone=0;
      entries.forEach(function(e){
        if(e[1].status==="new")sNew++;
        else if(e[1].status==="working")sWork++;
        else if(e[1].status==="done")sDone++;
      });
      document.getElementById("sum-new").textContent=sNew;
      document.getElementById("sum-working").textContent=sWork;
      document.getElementById("sum-done").textContent=sDone;
      var badge=document.getElementById("new-badge");
      badge.textContent=sNew||""; badge.style.display=sNew?"inline-flex":"none";

      if(currentTab==="active") {
        var active = entries.filter(function(e){ return e[1].status!=="done"; });
        if(currentFilter!=="all") active=active.filter(function(e){ return e[1].status===currentFilter; });
        if(currentTableFilter!=="all") active=active.filter(function(e){ return String(e[1].table)===currentTableFilter; });
        var list=document.getElementById("orders-list");
        if(active.length===0){ list.innerHTML='<div class="empty">対応中の注文はありません</div>'; return; }
        list.innerHTML=active.map(function(entry){
          var key=entry[0],o=entry[1];
          return '<div class="order-card" id="card-'+key+'">' +
            '<div class="card-header">' +
              '<div class="card-left"><span class="table-num">Table '+o.table+'</span><span class="status-badge '+(scls[o.status]||'')+'">'+( slabel[o.status]||o.status)+'</span></div>' +
              '<div class="card-right"><span class="time-ago">'+timeAgo(o.createdAt)+'</span><span class="total-price">¥'+(o.total||0).toLocaleString()+'</span></div>' +
            '</div>' +
            '<div class="item-list">'+(o.items||[]).map(function(i){
              return '<div class="item-row"><span class="item-name">'+i.name+'</span><span class="item-qty">×'+i.qty+'</span><span class="item-subtotal">¥'+(i.price*i.qty).toLocaleString()+'</span></div>';
            }).join("")+'</div>' +
            '<div class="card-actions">' +
              (o.status==="new"?'<button class="act-btn act-working" onclick="changeStatus(\''+key+'\',\'working\')">準備中にする</button>':"") +
              (o.status==="working"?'<button class="act-btn act-done" onclick="changeStatus(\''+key+'\',\'done\')">完了にする</button>':"") +
            '</div>' +
          '</div>';
        }).join("");
      } else {
        var done=entries.filter(function(e){ return e[1].status==="done"; });
        if(currentTableFilter!=="all") done=done.filter(function(e){ return String(e[1].table)===currentTableFilter; });
        var hlist=document.getElementById("history-list");
        if(done.length===0){ hlist.innerHTML='<div class="empty">完了した注文はまだありません</div>'; return; }
        var tableTotal=0;
        done.forEach(function(entry){ tableTotal+=(entry[1].total||0); });
        hlist.innerHTML=done.map(function(entry){
          var key=entry[0],o=entry[1];
          return '<div class="order-card is-done">' +
            '<div class="card-header">' +
              '<div class="card-left"><span class="table-num">Table '+o.table+'</span><span class="status-badge status-done">完了</span></div>' +
              '<div class="card-right"><span class="time-ago">'+timeAgo(o.createdAt)+'</span><span class="total-price">¥'+(o.total||0).toLocaleString()+'</span></div>' +
            '</div>' +
            '<div class="item-list">'+(o.items||[]).map(function(i){
              return '<div class="item-row"><span class="item-name">'+i.name+'</span><span class="item-qty">×'+i.qty+'</span><span class="item-subtotal">¥'+(i.price*i.qty).toLocaleString()+'</span></div>';
            }).join("")+'</div>' +
          '</div>';
        }).join("")+
        (done.length>0?'<div style="text-align:right;padding:12px 4px 4px;font-family:var(--font-d);font-size:18px;color:var(--gold);border-top:1px solid var(--border);margin-top:4px">'+
          (currentTableFilter!=="all"?currentTableFilter+' の合計 ':'完了合計 ')+'¥'+tableTotal.toLocaleString()+'</div>':'');
      }
    }

    m.onValue(m.query(m.ref(db,"orders"),m.orderByChild("createdAt")), function(snap) {
      var prev=Object.assign({},allOrders);
      allOrders=snap.val()||{};
      Object.entries(allOrders).forEach(function(entry){
        var k=entry[0],o=entry[1];
        if(!prev[k]&&o.status==="new"&&notifGranted){
          new Notification("barvaediva — 新しい注文",{body:"Table "+o.table+"から注文が入りました"});
        }
      });
      render();
    });

    setInterval(render,30000);
  });
}
</script>
</body>
</html>
