<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>barvaediva — 注文管理</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0b09;--surface:#181410;--surface2:#1e1a15;--border:#2e2820;
  --gold:#c9a96e;--gold-dim:#8a6e45;--text:#f0ead8;--muted:#7a6f5e;
  --red:#e05c5c;--green:#6dbf8a;--amber:#d4a24c;
  --font-display:'Cormorant Garamond',serif;--font-body:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-weight:300;min-height:100vh;padding-bottom:32px}

#setup-banner{background:#1a1008;border-bottom:1px solid #5a3a10;padding:14px 20px;font-size:12px;color:#d4a24c;line-height:1.9;text-align:center}
#setup-banner strong{color:#f0c060;font-weight:400;display:block;margin-bottom:4px;font-size:13px}
#setup-banner code{background:#2a1a08;border:1px solid #5a3a10;padding:1px 6px;border-radius:3px;font-size:11px;letter-spacing:0.03em}
#setup-banner.hidden{display:none}

header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.h-logo{font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--gold);letter-spacing:0.1em;display:flex;align-items:center;gap:10px}
#new-badge{display:none;background:var(--red);color:#fff;font-family:var(--font-body);font-size:11px;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.h-sub{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-align:right}
#orders-list{padding:16px;max-width:600px;margin:0 auto;display:grid;gap:12px}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:opacity .3s}
.order-card.is-done{opacity:.45}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.card-left{display:flex;align-items:center;gap:10px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.table-num{font-family:var(--font-display);font-size:20px;font-weight:400;color:var(--gold);letter-spacing:0.05em}
.time-ago{font-size:11px;color:var(--muted)}
.total-price{font-family:var(--font-display);font-size:18px;color:var(--text);font-weight:300}
.status-badge{font-size:10px;letter-spacing:0.1em;padding:3px 10px;border-radius:2px;font-weight:400}
.status-new{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.3)}
.status-working{background:rgba(212,162,76,.12);color:var(--amber);border:1px solid rgba(212,162,76,.3)}
.status-done{background:rgba(109,191,138,.1);color:var(--green);border:1px solid rgba(109,191,138,.25)}
.item-list{padding:12px 16px}
.item-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(46,40,32,.5);font-size:13px}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;color:var(--text)}
.item-qty{color:var(--muted);margin:0 16px;min-width:28px;text-align:right}
.item-subtotal{color:var(--gold-dim);min-width:72px;text-align:right;font-size:12px}
.card-actions{padding:10px 16px 14px;display:flex;gap:8px;align-items:center}
.act-btn{padding:8px 20px;border-radius:2px;border:1px solid;background:transparent;font-family:var(--font-body);font-size:12px;letter-spacing:0.08em;cursor:pointer;transition:background .2s}
.act-working{color:var(--amber);border-color:rgba(212,162,76,.4)}
.act-working:hover{background:rgba(212,162,76,.1)}
.act-done{color:var(--green);border-color:rgba(109,191,138,.4)}
.act-done:hover{background:rgba(109,191,138,.08)}
.done-label{font-size:12px;color:var(--green);letter-spacing:0.08em}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;letter-spacing:0.1em;border:1px dashed var(--border);border-radius:4px}
</style>
</head>
<body>

<div id="setup-banner">
  <strong>⚠ Firebase未設定 — このファイルをメモ帳やVSCodeで開いて設定してください</strong>
  このファイルの末尾にある <code>★ここにFirebaseの設定を貼り付け★</code> の箇所を
  Firebaseコンソールのコードに書き換えてください。<br>
  order.html と staff.html の両方に同じ値を設定する必要があります。
</div>

<header>
  <div class="h-logo">
    barvaediva
    <span id="new-badge"></span>
  </div>
  <div class="h-sub">注文管理画面<br>スタッフ専用</div>
</header>

<div id="orders-list">
  <div class="empty">Firebase設定後に注文がここに表示されます</div>
</div>

<!-- ▼▼▼ ★★★ ここにFirebaseの設定を貼り付け ★★★ ▼▼▼

  【手順】order.html と同じ値を貼り付けてください。
  1. https://console.firebase.google.com を開く
  2. プロジェクトを選択
  3. 左上の歯車アイコン →「プロジェクトの設定」
  4. 下にスクロール →「マイアプリ」→「</>」ウェブアプリをクリック
  5. 表示される firebaseConfig の内容をコピーして下に貼り付け

▲▲▲ 上の説明を読んでから下を書き換えてください ▲▲▲ -->

<script type="module">
var firebaseConfig = {
  apiKey:            "AIzaSyAFrmMUkpBXL-aBBxXjO8HBPOD2glM9jkk",
  authDomain:        "qrclaud.firebaseapp.com",
  databaseURL:       "https://qrclaud-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "qrclaud",
  storageBucket:     "qrclaud.firebasestorage.app",
  messagingSenderId: "1028256471338",
  appId:             "1:1028256471338:web:539d7dc0e42f988a69e653"
};

if (firebaseConfig.apiKey.includes("ここに")) {
  // 未設定：何もしない（バナーが表示されている）
} else {
  document.getElementById("setup-banner").classList.add("hidden");

  Promise.all([
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js")
  ]).then(function(modules) {
    var initializeApp = modules[0].initializeApp;
    var m = modules[1];
    var app = initializeApp(firebaseConfig);
    var db = m.getDatabase(app);

    var allOrders = {};
    var notifGranted = false;
    if("Notification" in window){
      Notification.requestPermission().then(function(p){ notifGranted = p==="granted"; });
    }

    function timeAgo(ts) {
      if(!ts) return "";
      var diff = Math.floor((Date.now()-ts)/1000);
      if(diff<60) return diff+"秒前";
      if(diff<3600) return Math.floor(diff/60)+"分前";
      return Math.floor(diff/3600)+"時間前";
    }

    function render() {
      var list = document.getElementById("orders-list");
      var entries = Object.entries(allOrders).sort(function(a,b){ return (b[1].createdAt||0)-(a[1].createdAt||0); });
      var newCount = entries.filter(function(e){ return e[1].status==="new"; }).length;
      var badge = document.getElementById("new-badge");
      badge.textContent = newCount||"";
      badge.style.display = newCount?"inline-flex":"none";

      if(entries.length===0){
        list.innerHTML='<div class="empty">注文を待っています</div>';
        return;
      }

      var statusLabel = {new:"新着",working:"準備中",done:"完了"};
      var statusCls = {new:"status-new",working:"status-working",done:"status-done"};

      list.innerHTML = entries.map(function(entry) {
        var key=entry[0], o=entry[1];
        return '<div class="order-card'+(o.status==="done"?" is-done":"")+'" id="card-'+key+'">' +
          '<div class="card-header">' +
            '<div class="card-left">' +
              '<span class="table-num">Table '+o.table+'</span>' +
              '<span class="status-badge '+(statusCls[o.status]||'')+'">'+(statusLabel[o.status]||o.status)+'</span>' +
            '</div>' +
            '<div class="card-right">' +
              '<span class="time-ago">'+timeAgo(o.createdAt)+'</span>' +
              '<span class="total-price">¥'+(o.total||0).toLocaleString()+'</span>' +
            '</div>' +
          '</div>' +
          '<div class="item-list">' +
            (o.items||[]).map(function(i){
              return '<div class="item-row">' +
                '<span class="item-name">'+i.name+'</span>' +
                '<span class="item-qty">×'+i.qty+'</span>' +
                '<span class="item-subtotal">¥'+(i.price*i.qty).toLocaleString()+'</span>' +
              '</div>';
            }).join("") +
          '</div>' +
          '<div class="card-actions">' +
            (o.status==="new"?'<button class="act-btn act-working" onclick="changeStatus(\''+key+'\',\'working\')">準備中にする</button>':"") +
            (o.status==="working"?'<button class="act-btn act-done" onclick="changeStatus(\''+key+'\',\'done\')">完了にする</button>':"") +
            (o.status==="done"?'<span class="done-label">✓ 提供済み</span>':"") +
          '</div>' +
        '</div>';
      }).join("");
    }

    window.changeStatus = function(key, status) {
      m.update(m.ref(db,"orders/"+key),{status:status});
    };

    m.onValue(m.query(m.ref(db,"orders"),m.orderByChild("createdAt")), function(snap) {
      var prev = Object.assign({},allOrders);
      allOrders = snap.val()||{};
      Object.entries(allOrders).forEach(function(entry) {
        var k=entry[0], o=entry[1];
        if(!prev[k] && o.status==="new" && notifGranted){
          new Notification("barvaediva — 新しい注文",{body:"Table "+o.table+"から注文が入りました"});
        }
      });
      render();
    });

    setInterval(render, 30000);
  }).catch(function(err){ console.error("Firebase読み込みエラー:", err); });
}
</script>

</body>
</html>
